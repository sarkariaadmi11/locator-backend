version: '3.9'

# Local/prod-parity stack for the Locator backend — Postgres + Redis + the API itself. Mirrors
# what production needs (see docs/CLAUDE.md/API.md "Production configuration"); managed
# Postgres/Redis/Cloudinary/Firebase/Razorpay credentials still come from a real `.env` in an
# actual deployment, this compose file is for local dev/CI parity, not a production topology.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: locator
      POSTGRES_PASSWORD: locator
      POSTGRES_DB: locator_db
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U locator']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://locator:locator@postgres:5432/locator_db?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
